# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

steps:
- task: Gradle@2
  displayName: 'Gradle Clean Build'
  inputs:
    gradleWrapperFile: 'gradlew'
    tasks: 'clean build'
    publishJUnitResults: true
    testResultsFiles: '**/TEST-*.xml'
    javaHomeOption: 'JDKVersion'
    sonarQubeRunAnalysis: false

- task: Docker@2
  displayName: 'Docker Build API'
  inputs:
    containerRegistry: 'hello-okta-dr'
    repository: 'hellooktaapi'
    command: 'buildAndPush'
    Dockerfile: '$(Build.SourcesDirectory)/hello-okta-api/Dockerfile'

- task: Docker@2
  displayName: 'Docker Build BFF'
  inputs:
    containerRegistry: 'hello-okta-dr'
    repository: 'hellooktabff'
    command: 'buildAndPush'
    Dockerfile: '$(Build.SourcesDirectory)/hello-okta-bff/Dockerfile'